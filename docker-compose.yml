services:
  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    env_file:
      - .env
    environment:
      FETCH_URL: ${FETCH_URL:-https://jsonplaceholder.typicode.com/todos}
      SINK_URL: ${SINK_URL:-http://sink-api:8000/records}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8080:8080"
    depends_on:
      - sink-api

  sink-api:
    build:
      context: .
      dockerfile: sink-api/Dockerfile
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - orchestrator
